# Render Blueprint: деплой EduLife (Django)
# Документация: https://docs.render.com/blueprint-spec
#
# После деплоя URL сервиса будет вида: https://edulife.onrender.com (или с суффиксом).
# API: https://<твой-url>/api/  |  Swagger: https://<твой-url>/swagger/  |  ReDoc: https://<твой-url>/redoc/

services:
  - type: web
    name: edulife
    runtime: python
    rootDir: edulife
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # В Render Dashboard (Environment) обязательно задай:
      # DJANGO_SECRET_KEY, DJANGO_ALLOWED_HOSTS=.onrender.com, DATABASE_URL (из PostgreSQL)
